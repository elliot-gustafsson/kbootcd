---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kbootcd
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kbootcd-role
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/eviction"]
    verbs: ["get", "list", "watch", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kbootcd-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kbootcd-role
subjects:
  - kind: ServiceAccount
    name: kbootcd
    namespace: kube-system

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kbootcd-target-image
  namespace: kube-system
data:
  target_image: "localhost/kbootcd-test/rke2:almalinux10"

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kbootcd
  namespace: kube-system
  labels:
    app: kbootcd
spec:
  selector:
    matchLabels:
      app: kbootcd
  template:
    metadata:
      labels:
        app: kbootcd
    spec:
      serviceAccountName: kbootcd
      hostPID: true
      hostNetwork: true
      containers:
        - name: kbootcd
          image: localhost/kbootcd:latest
          imagePullPolicy: Never
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: bootc-config
              mountPath: /etc/bootc-config
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: bootc-config
          configMap:
            name: kbootcd-target-image
