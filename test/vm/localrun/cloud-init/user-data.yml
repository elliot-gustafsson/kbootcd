#cloud-config
create_hostname_file: true
fqdn: "kbootcd-localrun"
hostname: "kbootcd-localrun"

ssh_pwauth: true
users:
  - name: admin
    groups: wheel
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    lock_passwd: false

# This block sets the password for specific users
chpasswd:
  list: |
    admin:admin
  expire: False

bootcmd:
  - mkdir -p /var/lib/rancher
  - mkdir -p /var/lib/rancher/kubelet
  - blkid /dev/vdb || mkfs.xfs -f /dev/vdb
  - grep -q "/dev/vdb" /etc/fstab || echo "/dev/vdb /var/lib/rancher xfs
    defaults 0 2" >> /etc/fstab
  - mount -a
  - restorecon -R /var/lib/rancher

runcmd:
  - systemctl restart sshd
  - systemctl enable --now rke2-server
  - echo "Cloud-init finished. Ready to login." > /dev/console

write_files:
  - path: /var/lib/rancher/rke2/server/manifests/rke2-cilium-config.yaml
    permissions: "0644"
    owner: root:root
    content: |
      apiVersion: helm.cattle.io/v1
      kind: HelmChartConfig
      metadata:
        name: rke2-cilium
        namespace: kube-system
      spec:
        valuesContent: |-
          kubeProxyReplacement: true
          k8sServiceHost: localhost
          k8sServicePort: 6443
          bpf:
            masquerade: true
          cni:
            chainingMode: none
