[customizations.kernel]
append = "net.ifnames=0 biosdevname=0 ipv6.disable=1"

[[customizations.filesystem]]
mountpoint = "/var/log"
minsize = "1 GiB"
type = "xfs"
label = "var-log"

[[customizations.filesystem]]
mountpoint = "/var/log/audit"
minsize = "10 GiB"
type = "xfs"
label = "audit"

[[customizations.filesystem]]
mountpoint = "/var/tmp"
minsize = "1 GiB"
type = "xfs"
label = "var-tmp"
